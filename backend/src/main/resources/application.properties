# -------------------------------------------------------
# H2 in-memory database (swap for real DB in production)
# -------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:nutritiondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:top3FoodsQuick.sql
spring.jpa.defer-datasource-initialization=true
# H2 console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# -------------------------------------------------------
# Max upload size for PDF files
# -------------------------------------------------------
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB